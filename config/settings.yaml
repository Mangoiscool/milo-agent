# Milo Agent 配置文件

# LLM 配置
llm:
  # 默认提供者
  provider: glm  # qwen | glm | deepseek | ollama
  
  # API 提供者配置
  api:
    qwen:
      api_key: ${QWEN_API_KEY}  # 从环境变量读取
      model: MiniMax-M2.1
    glm:
      api_key: ${GLM_API_KEY}
      model: glm-4-flash
    deepseek:
      api_key: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
  
  # Ollama 本地配置
  ollama:
    base_url: http://localhost:11434
    model: qwen3.5:4b
    think: true  # 思考模式（仅 Qwen3 等支持）
  
  # 通用参数
  temperature: 0.7
  max_tokens: 2048

# Agent 配置
agent:
  name: Milo
  max_history: 20  # 保留最近 N 条对话
